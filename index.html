<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Birthday bé yêu</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
perspective:1400px;
}

/* canvas */

canvas{
position:absolute;
top:0;
left:0;
}

/* gallery */

#gallery{ 
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%; height:100%;
display:flex; align-items:center;
justify-content:center;
perspective:1200px;
transform-style:preserve-3d; }

/* ảnh */

.photo{
position:absolute;
top:50%;
left:50%;
max-width:80px;
max-height:120px;
object-fit:contain;
border:4px solid gold;
border-radius:12px;
transform-origin:center;
transition:0.6s;
opacity:0;
background:black;
}

#gallery.show .photo{
opacity:1;
}

video{
display:none;
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="gallery" id="gallery">

<img class="photo" src="photo/anh1.png">
<img class="photo" src="photo/anh2.png">
<img class="photo" src="photo/anh3.png">
<img class="photo" src="photo/anh4.png">
<img class="photo" src="photo/anh5.png">
<img class="photo" src="photo/anh6.png">

</div>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

/* canvas */

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

const cx=canvas.width/2
const cy=canvas.height/2

/* tạo hộp quà */

let shape=[]

for(let x=-120;x<=120;x+=4){
for(let y=-90;y<=90;y+=4){

if(Math.abs(x)==120 || Math.abs(y)==90){
shape.push({x:cx+x,y:cy+y})
}

if(y>-5 && y<5 && x>-120 && x<120){
shape.push({x:cx+x,y:cy+y})
}

if(x>-6 && x<6 && y>-90 && y<90){
shape.push({x:cx+x,y:cy+y})
}

if(y>-6 && y<6 && x>-120 && x<120){
shape.push({x:cx+x,y:cy+y})
}

}
}

/* nơ */

for(let a=0;a<180;a+=4){

let r=35
let rad=a*Math.PI/180

shape.push({
x:cx-35+Math.cos(rad)*r,
y:cy-95+Math.sin(rad)*r*0.6
})

shape.push({
x:cx+35-Math.cos(rad)*r,
y:cy-95+Math.sin(rad)*r*0.6
})

}

for(let a=0;a<360;a+=6){

let r=10
let rad=a*Math.PI/180

shape.push({
x:cx+Math.cos(rad)*r,
y:cy-95+Math.sin(rad)*r
})

}

let particles=[]

shape.forEach(s=>{
particles.push({
x:cx,
y:cy,
tx:s.x,
ty:s.y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4
})
})

let state="box"

/* vẽ */

function draw(){

ctx.fillStyle="rgba(0,0,0,0.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="gold"

particles.forEach(p=>{

if(state==="box"){
p.x+=(p.tx-p.x)*0.08
p.y+=(p.ty-p.y)*0.08
}

if(state==="explode"){
p.x+=p.vx
p.y+=p.vy
}

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

const gallery=document.getElementById("gallery")
const photos=document.querySelectorAll(".photo")

let index=0
const radius=450

function updateGallery(){

photos.forEach((img,i)=>{

let angle=(i-index)*60
let rad=angle*Math.PI/180

let x=Math.sin(rad)*radius
let z=Math.cos(rad)*radius

img.style.transform=
`translate(-50%,-50%) translateY(120px) translateX(${x}px) translateZ(${z}px) rotateY(${angle}deg)`

})

}

updateGallery()

let opened=false

/* microphone */

let audioContext
let analyser
let mic
let data
let lastSound=0

async function startMic(){

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

audioContext=new AudioContext()
mic=audioContext.createMediaStreamSource(stream)

analyser=audioContext.createAnalyser()
analyser.fftSize=256

data=new Uint8Array(analyser.frequencyBinCount)

mic.connect(analyser)

detectSound()

}

function detectSound(){

analyser.getByteFrequencyData(data)

let volume=0

for(let i=0;i<data.length;i++){
volume+=data[i]
}

volume/=data.length

if(volume>40 && opened){

let now=Date.now()

if(now-lastSound>500){

index=(index+1)%photos.length
updateGallery()

lastSound=now

}

}

requestAnimationFrame(detectSound)

}

document.body.addEventListener("click",()=>{
startMic()
},{once:true})

/* hand detection */

const video=document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
video.srcObject=stream
})

const hands=new Hands({
locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
})

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

function handOpen(lm){
return(
lm[8].y < lm[6].y &&
lm[12].y < lm[10].y
)
}

function handClosed(lm){
return(
lm[8].y > lm[6].y &&
lm[12].y > lm[10].y
)
}

hands.onResults(results=>{

const list=results.multiHandLandmarks

if(!opened && list.length>=1){

if(handOpen(list[0])){
opened=true
state="explode"
gallery.classList.add("show")
}

}

if(opened && list.length===2){

if(handClosed(list[0]) && handClosed(list[1])){

opened=false
state="box"
gallery.classList.remove("show")

index=0
updateGallery()

}

}

})

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video})
},
width:640,
height:480
})

camera.start()
window.onresize=()=>{
canvas.width=innerWidth
canvas.height=innerHeight
}

</script>

</body>
</html>
